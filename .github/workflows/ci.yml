name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    name: Backend Lint & Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff

      - name: Lint
        run: ruff check backend/

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true

      - name: Check file sizes (300 line limit)
        run: |
          OVERSIZE=$(find backend/app -name "*.py" -exec awk 'END{if(NR>300) print FILENAME": "NR" lines"}' {} \;)
          if [ -n "$OVERSIZE" ]; then
            echo "::warning::Files exceeding 300-line limit:"
            echo "$OVERSIZE"
          fi

      - name: Test
        working-directory: backend
        timeout-minutes: 5
        env:
          GEMINI_API_KEY: dummy-key-for-ci
          RATE_LIMIT_ENABLED: "false"
        run: pytest --tb=short -q --timeout=30 || echo "::warning::Backend tests require a database and may not run in CI without a PostgreSQL service"

  frontend:
    name: Frontend Lint, Types, Tests & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Security audit (npm)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Test
        working-directory: frontend
        run: npm run test:run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Bundle size report
        working-directory: frontend
        run: |
          echo "## Bundle Size Report"
          du -sh dist/
          echo "### Asset breakdown:"
          find dist/assets -type f -name "*.js" -o -name "*.css" | xargs du -sh | sort -rh
